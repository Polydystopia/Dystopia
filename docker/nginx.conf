upstream upstream {
	server dystopia:80;
}

access_log off;

server {
	listen 443 ssl;
	listen [::]:443 ssl; # ipv6
	
	server_name polydystopia.xyz www.polydystopia.xyz start.polydystopia.xyz; # this is as long as polytopia-prod.net
	
	ssl_certificate /etc/ssl/certs/dystopia.xyz.crt;
	ssl_certificate_key /etc/ssl/certs/dystopia.xyz.key;

	location / {
		proxy_pass http://upstream;
		proxy_set_header Host $host;
	        proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
	        proxy_set_header X-Forwarded-Proto $scheme;
	}
}

server { # for dns redirect
	listen 443 ssl;
        listen [::]:443 ssl; # ipv6

        server_name polytopia-prod.net;

        ssl_certificate /etc/ssl/certs/polytopia-prod.net.crt;
        ssl_certificate_key /etc/ssl/certs/polytopia-prod.net.key;

        location / {
                proxy_pass http://upstream;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }
}

server { # direct ip or other name, https is useless here
        listen 80;
        listen [::]:80; # ipv6

        server_name _;

        location / {
                proxy_pass http://upstream;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
        }
}
