services:
  dystopia:
    image: dystopia:latest
    restart: unless-stopped
    expose:
      - "5000"
  nginx:
    image: nginx:stable-alpine
    container_name: dystopia_proxy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - dystopia
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
